<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Categories — Inventory System</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-shell">
      <!-- Top bar -->
      <header class="topbar">
        <h1>Categories</h1>
        <div class="topbar-user">
          Logged in as <span id="topbar-name"></span>
        </div>
      </header>

      <!-- Sidebar -->
      <nav class="sidebar">
        <div class="cat"><i class="fa-solid fa-cat"></i></div>
        <div class="topbar-brand">invsys</div>
        <div class="system-name">Inventory Management System</div>
        <a href="/pages/dashboard.html" data-page="dashboard">
          <span class="icon"><i class="fa-solid fa-chart-column"></i></span>
          Dashboard
        </a>
        <a href="/pages/products.html" data-page="products">
          <span class="icon"><i class="fa-solid fa-basket-shopping"></i></span>
          Products
        </a>
        <a href="/pages/categories.html" data-page="categories">
          <span class="icon"><i class="fa-solid fa-list"></i></span> Categories
        </a>
        <a href="/pages/stock.html" data-page="stock">
          <span class="icon"><i class="fa-solid fa-boxes-stacked"></i></span>
          Stock
        </a>
        <a href="/pages/lowstock.html" data-page="lowstock">
          <span class="icon"
            ><i class="fa-solid fa-triangle-exclamation"></i
          ></span>
          Low Stock
        </a>
        <div class="sidebar-spacer"></div>
        <button class="logout-btn" id="logout-btn">
          <span class="icon"
            ><i class="fa-solid fa-right-from-bracket"></i
          ></span>
          Logout
        </button>
      </nav>
      <main class="main-content">
        <div class="page-header">
          <div>
            <h1>Categories</h1>
            <div class="page-subtitle">Organize products by category.</div>
          </div>
          <button class="btn btn-primary" onclick="openAddModal()">
            + Add Category
          </button>
        </div>

        <div class="toolbar">
          <input
            type="text"
            id="search"
            placeholder="Search categories…"
            oninput="renderTable()"
          />
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Category Name</th>
                <th>Description</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="cat-tbody">
              <tr>
                <td
                  colspan="4"
                  class="text-dim"
                  style="text-align: center; padding: 32px"
                >
                  Loading…
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- Add / Edit Modal -->
    <div class="modal-overlay" id="cat-modal">
      <div class="modal">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-title">Add Category</h2>
          <button class="modal-close" onclick="closeModal('cat-modal')">
            &#x2715;
          </button>
        </div>
        <input type="hidden" id="edit-id" />
        <div class="form-group">
          <label for="cat-name">Category Name *</label>
          <input type="text" id="cat-name" placeholder="e.g. Beverages" />
        </div>
        <div class="form-group">
          <label for="cat-desc">Description (optional)</label>
          <input type="text" id="cat-desc" placeholder="Brief description" />
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal('cat-modal')">
            Cancel
          </button>
          <button
            class="btn btn-primary"
            id="save-btn"
            onclick="saveCategory()"
          >
            Save
          </button>
        </div>
      </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
      initShell("categories");

      let categories = [];

      async function loadCategories() {
        try {
          categories = await api("/categories");
          renderTable();
        } catch (err) {
          toast("Failed to load categories: " + err.message, "error");
        }
      }

      function renderTable() {
        const q = document.getElementById("search").value.toLowerCase();
        const tbody = document.getElementById("cat-tbody");
        const filtered = categories.filter(
          (c) =>
            c.category_name.toLowerCase().includes(q) ||
            (c.description || "").toLowerCase().includes(q),
        );

        if (filtered.length === 0) {
          tbody.innerHTML = `<tr><td colspan="4"><div class="empty-state">
        <div class="empty-state-icon">&#9670;</div>
        <h3>No categories found</h3>
        <p class="text-dim">Add your first category using the button above.</p>
      </div></td></tr>`;
          return;
        }

        tbody.innerHTML = filtered
          .map(
            (c) => `
      <tr>
        <td class="mono text-dim">#${c.category_id}</td>
        <td><strong>${c.category_name}</strong></td>
        <td class="text-dim">${c.description || "—"}</td>
        <td>
          <div class="actions-cell">
            <button class="btn btn-ghost btn-sm" onclick="openEditModal(${c.category_id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteCategory(${c.category_id}, '${c.category_name}')">Delete</button>
          </div>
        </td>
      </tr>
    `,
          )
          .join("");
      }

      function openAddModal() {
        document.getElementById("modal-title").textContent = "Add Category";
        document.getElementById("edit-id").value = "";
        document.getElementById("cat-name").value = "";
        document.getElementById("cat-desc").value = "";
        openModal("cat-modal");
      }

      function openEditModal(id) {
        const cat = categories.find((c) => c.category_id === id);
        if (!cat) return;
        document.getElementById("modal-title").textContent = "Edit Category";
        document.getElementById("edit-id").value = id;
        document.getElementById("cat-name").value = cat.category_name;
        document.getElementById("cat-desc").value = cat.description || "";
        openModal("cat-modal");
      }

      async function saveCategory() {
        const id = document.getElementById("edit-id").value;
        const name = document.getElementById("cat-name").value.trim();
        const desc = document.getElementById("cat-desc").value.trim();

        if (!name) {
          toast("Category name is required.", "error");
          return;
        }

        const btn = document.getElementById("save-btn");
        btn.disabled = true;

        try {
          const body = JSON.stringify({
            category_name: name,
            description: desc,
          });
          if (id) {
            await api(`/categories?id=${id}`, { method: "PUT", body });
            toast("Category updated.");
          } else {
            await api("/categories", { method: "POST", body });
            toast("Category created.");
          }
          closeModal("cat-modal");
          loadCategories();
        } catch (err) {
          toast(err.message, "error");
        } finally {
          btn.disabled = false;
        }
      }

      async function deleteCategory(id, name) {
        if (
          !confirm(
            `Delete category "${name}"?\nThis will fail if products are still assigned to it.`,
          )
        )
          return;
        try {
          await api(`/categories?id=${id}`, { method: "DELETE" });
          toast("Category deleted.");
          loadCategories();
        } catch (err) {
          toast(err.message, "error");
        }
      }

      loadCategories();
    </script>
  </body>
</html>
